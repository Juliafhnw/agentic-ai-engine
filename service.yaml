apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: agentic-ai-engine
  annotations:
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        run.googleapis.com/execution-environment: gen2
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "10"
    spec:
      serviceAccountName: vertex-express@agentic-ai-engineering-497117.iam.gserviceaccount.com
      containers:
        - image: gcr.io/agentic-ai-engineering-497117/agentic-ai-engine:latest
          ports:
            - containerPort: 8080
          env:
            - name: GOOGLE_CLOUD_PROJECT
              value: agentic-ai-engineering-497117
            - name: GOOGLE_CLOUD_LOCATION
              value: europe-north1
            - name: GOOGLE_CLOUD_STORAGE_BUCKET
              value: bucket-agentic-ai-engineering
            - name: GOOGLE_GENAI_USE_VERTEXAI
              value: "TRUE"
            - name: DEFAULT_AGENT_ID
              value: greeting_agent
            - name: DEFAULT_LLM_MODEL
              value: gemini-2.5-flash
            - name: SESSION_BACKEND
              value: VERTEX
            - name: MEMORY_BANK_LOCATION
              value: us-central1
            - name: CRITIQUE_AGENT_URL
              value: https://juxlia-critique-agent.hf.space
          resources:
            limits:
              cpu: "2"
              memory: 2Gi
